<svg width="100%" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glowR">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowG">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowB">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00ff66" stroke-width="0.3" opacity="0.08"/>
    </pattern>
    <pattern id="dots" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.6" fill="#ffffff" opacity="0.35"/>
      <circle cx="32" cy="22" r="1.8" fill="#ffd400" opacity="0.45"/>
      <circle cx="52" cy="38" r="1.5" fill="#ffffff" opacity="0.30"/>
      <circle cx="20" cy="50" r="1.7" fill="#ffd400" opacity="0.40"/>
    </pattern>
  </defs>
  <style>
    svg { background: black; }

    .text {
      font-family: monospace;
      font-size: 38px;
      text-anchor: middle;
      dominant-baseline: middle;
      opacity: 0;
      animation: show 16s infinite;
      letter-spacing: 0.5px;
    }
    @keyframes show {
      0%   { opacity: 0; transform: translateY(4px) scale(0.99); }
      4%   { opacity: 1; transform: translateY(0px) scale(1); }
      14%  { opacity: 1; }
      18%  { opacity: 0; transform: translateY(-3px) scale(1.01); }
      100% { opacity: 0; }
    }

    .ghost {
      font-family: monospace;
      font-size: 38px;
      text-anchor: middle;
      dominant-baseline: middle;
      letter-spacing: 0.5px;
      opacity: 0;
      pointer-events: none;
    }
    .ghost-red { fill:#ff2b4d; }
    .ghost-cyan { fill:#00e0ff; }
    .ghost-red.shift { animation: ghostPopL 16s infinite; }
    .ghost-cyan.shift { animation: ghostPopR 16s infinite; }
    @keyframes ghostPopL {
      0%    { opacity: 0; transform: translateX(0); }
      3.2%  { opacity: 0.55; transform: translateX(-3px); }
      4%    { opacity: 0.3; transform: translateX(-1px); }
      4.6%  { opacity: 0; transform: translateX(0); }
      100%  { opacity: 0; }
    }
    @keyframes ghostPopR {
      0%    { opacity: 0; transform: translateX(0); }
      3.2%  { opacity: 0.55; transform: translateX(3px); }
      4%    { opacity: 0.3; transform: translateX(1px); }
      4.6%  { opacity: 0; transform: translateX(0); }
      100%  { opacity: 0; }
    }

    .jitter { animation: show 16s infinite, jitter 16s infinite; }
    @keyframes jitter {
      0%    { transform: translateX(0); }
      3.4%  { transform: translateX(-2px); }
      3.7%  { transform: translateX(2px); }
      4%    { transform: translateX(-1px); }
      4.3%  { transform: translateX(0); }
      100%  { transform: translateX(0); }
    }

    .scan {
      animation: scan 3.5s linear infinite;
    }
    @keyframes scan {
      from { transform: translateY(-200px); opacity: 0.06; }
      to   { transform: translateY(200px); opacity: 0.06; }
    }
    .scan2 {
      animation: scan2 1.7s linear infinite;
    }
    @keyframes scan2 {
      from { transform: translateY(-200px); opacity: 0.03; }
      to   { transform: translateY(200px); opacity: 0.03; }
    }

    .flicker { animation: flicker 6s infinite; }
    @keyframes flicker {
      0%, 96%, 100% { opacity: 1; }
      97% { opacity: 0.94; }
      98% { opacity: 1; }
      99% { opacity: 0.97; }
    }

    .r { fill:#ff4040; filter:url(#glowR); }
    .g { fill:#00ff66; filter:url(#glowG); }
    .b { fill:#4da3ff; filter:url(#glowB); }
  </style>

  <g class="flicker">
    <rect width="100%" height="100%" fill="black"/>
    <rect width="900" height="200" fill="url(#grid)"/>
    <rect width="900" height="200" fill="url(#dots)"/>
    <rect class="scan" x="0" y="-200" width="900" height="2" fill="white"/>
    <rect class="scan2" x="0" y="-200" width="900" height="1" fill="white"/>

    <!-- line 1 -->
    <text class="ghost ghost-red shift" x="50%" y="55%" style="animation-delay:0s">ML Intern @ ECE UAlberta (2026)</text>
    <text class="ghost ghost-cyan shift" x="50%" y="55%" style="animation-delay:0s">ML Intern @ ECE UAlberta (2026)</text>
    <text class="text jitter r" x="50%" y="55%" style="animation-delay:0s">ML Intern @ ECE UAlberta (2026)</text>

    <!-- line 2 -->
    <text class="ghost ghost-red shift" x="50%" y="55%" style="animation-delay:2s">AWS Certified Cloud Practitioner</text>
    <text class="ghost ghost-cyan shift" x="50%" y="55%" style="animation-delay:2s">AWS Certified Cloud Practitioner</text>
    <text class="text jitter g" x="50%" y="55%" style="animation-delay:2s">AWS Certified Cloud Practitioner</text>

    <!-- line 3 -->
    <text class="ghost ghost-red shift" x="50%" y="55%" style="animation-delay:4s">1x Hackathon Winner</text>
    <text class="ghost ghost-cyan shift" x="50%" y="55%" style="animation-delay:4s">1x Hackathon Winner</text>
    <text class="text jitter b" x="50%" y="55%" style="animation-delay:4s">1x Hackathon Winner</text>

    <!-- line 4 -->
    <text class="ghost ghost-red shift" x="50%" y="55%" style="animation-delay:6s">SQA Intern @ Black Box Labz (2025)</text>
    <text class="ghost ghost-cyan shift" x="50%" y="55%" style="animation-delay:6s">SQA Intern @ Black Box Labz (2025)</text>
    <text class="text jitter r" x="50%" y="55%" style="animation-delay:6s">SQA Intern @ Black Box Labz (2025)</text>

    <!-- line 5 -->
    <text class="ghost ghost-red shift" x="50%" y="55%" style="animation-delay:8s">Software Dev @ UAlberta (2025)</text>
    <text class="ghost ghost-cyan shift" x="50%" y="55%" style="animation-delay:8s">Software Dev @ UAlberta (2025)</text>
    <text class="text jitter g" x="50%" y="55%" style="animation-delay:8s">Software Dev @ UAlberta (2025)</text>

    <!-- line 6 -->
    <text class="ghost ghost-red shift" x="50%" y="55%" style="animation-delay:10s">Dean's Research Award (2024–25)</text>
    <text class="ghost ghost-cyan shift" x="50%" y="55%" style="animation-delay:10s">Dean's Research Award (2024–25)</text>
    <text class="text jitter b" x="50%" y="55%" style="animation-delay:10s">Dean's Research Award (2024–25)</text>

    <!-- line 7 -->
    <text class="ghost ghost-red shift" x="50%" y="55%" style="animation-delay:12s">Ongoing AI/ML Explorations</text>
    <text class="ghost ghost-cyan shift" x="50%" y="55%" style="animation-delay:12s">Ongoing AI/ML Explorations</text>
    <text class="text jitter r" x="50%" y="55%" style="animation-delay:12s">Ongoing AI/ML Explorations</text>

    <!-- line 8 -->
    <text class="ghost ghost-red shift" x="50%" y="55%" style="animation-delay:14s">Building Terminal IDE</text>
    <text class="ghost ghost-cyan shift" x="50%" y="55%" style="animation-delay:14s">Building Terminal IDE</text>
    <text class="text jitter g" x="50%" y="55%" style="animation-delay:14s">Building Terminal IDE</text>
  </g>
</svg>
