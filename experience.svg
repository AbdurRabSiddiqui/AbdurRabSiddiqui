<svg width="100%" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="200" fill="#0d1117"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="33%" stop-color="#a371f7"/>
      <stop offset="66%" stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="#58a6ff" stroke-width="0.4" opacity="0.05"/>
    </pattern>
  </defs>

  <style>
    .card { fill: url(#bg); }
    .chrome-line { stroke:#30363d; stroke-width:1; }
    .title { fill:#8b949e; font-family:'Courier New', monospace; font-size:12px; }
    .prompt-static { fill:#6e7681; font-family:'Courier New', monospace; font-size:14px; }
    .arrow { font-family:'Courier New', monospace; font-size:22px; font-weight:bold; }
    .line-text { font-family:'Courier New', monospace; font-size:22px; fill:#c9d1d9; }
    .cursor { font-family:'Courier New', monospace; font-size:22px; }
    .foot { fill:#484f58; font-family:'Courier New', monospace; font-size:11px; }

    .rotator {
      opacity:0;
      animation: cycle 19.2s ease-in-out infinite;
    }
    @keyframes cycle {
      0%    { opacity:0; transform: translateX(-6px); }
      6%    { opacity:1; transform: translateX(0); }
      10%   { opacity:1; }
      12.5% { opacity:0; transform: translateX(6px); }
      100%  { opacity:0; }
    }
    .bar {
      transform-box: fill-box;
      transform-origin: left center;
      transform: scaleX(0);
      animation: shrink 19.2s ease-in-out infinite;
    }
    @keyframes shrink {
      0%    { transform: scaleX(0); opacity:0; }
      6%    { transform: scaleX(1); opacity:1; }
      11.5% { transform: scaleX(0.02); opacity:1; }
      12.5% { opacity:0; }
      100%  { opacity:0; }
    }
    .glow { animation: breathe 3s ease-in-out infinite; }
    @keyframes breathe {
      0%,100% { opacity:0.55; }
      50%     { opacity:1; }
    }
    .blink { animation: blink 1s steps(1) infinite; }
    @keyframes blink {
      0%,49% { opacity:1; }
      50%,100% { opacity:0; }
    }
  </style>

  <rect x="1" y="1" width="898" height="198" rx="10" class="card"/>
  <rect x="1" y="1" width="898" height="198" rx="10" fill="url(#grid)"/>
  <rect x="1" y="1" width="898" height="198" rx="10" fill="none" stroke="url(#border)" stroke-width="1.5" class="glow"/>

  <line x1="0" y1="34" x2="900" y2="34" class="chrome-line"/>
  <circle cx="22" cy="17" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="17" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="17" r="6" fill="#27c93f"/>
  <text x="450" y="21" text-anchor="middle" class="title">guest@readme — zsh</text>

  <text x="30" y="70" class="prompt-static">$ whoami --status</text>

  <!-- line 1 -->
  <g class="rotator" style="animation-delay:0s">
    <text x="30" y="122" class="arrow" fill="#58a6ff">❯</text>
    <text x="55" y="122" class="line-text" textLength="410" lengthAdjust="spacingAndGlyphs">ML Intern @ ECE UAlberta · 2026</text>
    <text x="472" y="122" class="cursor blink" fill="#58a6ff">▍</text>
  </g>
  <rect class="bar" style="animation-delay:0s" x="30" y="140" width="840" height="3" rx="1.5" fill="#58a6ff"/>

  <!-- line 2 -->
  <g class="rotator" style="animation-delay:2.4s">
    <text x="30" y="122" class="arrow" fill="#3fb950">❯</text>
    <text x="55" y="122" class="line-text" textLength="420" lengthAdjust="spacingAndGlyphs">AWS Certified Cloud Practitioner</text>
    <text x="482" y="122" class="cursor blink" fill="#3fb950">▍</text>
  </g>
  <rect class="bar" style="animation-delay:2.4s" x="30" y="140" width="840" height="3" rx="1.5" fill="#3fb950"/>

  <!-- line 3 -->
  <g class="rotator" style="animation-delay:4.8s">
    <text x="30" y="122" class="arrow" fill="#f0883e">❯</text>
    <text x="55" y="122" class="line-text" textLength="290" lengthAdjust="spacingAndGlyphs">1x Hackathon Winner 🏆</text>
    <text x="352" y="122" class="cursor blink" fill="#f0883e">▍</text>
  </g>
  <rect class="bar" style="animation-delay:4.8s" x="30" y="140" width="840" height="3" rx="1.5" fill="#f0883e"/>

  <!-- line 4 -->
  <g class="rotator" style="animation-delay:7.2s">
    <text x="30" y="122" class="arrow" fill="#a371f7">❯</text>
    <text x="55" y="122" class="line-text" textLength="440" lengthAdjust="spacingAndGlyphs">SQA Intern @ Black Box Labz · 2025</text>
    <text x="502" y="122" class="cursor blink" fill="#a371f7">▍</text>
  </g>
  <rect class="bar" style="animation-delay:7.2s" x="30" y="140" width="840" height="3" rx="1.5" fill="#a371f7"/>

  <!-- line 5 -->
  <g class="rotator" style="animation-delay:9.6s">
    <text x="30" y="122" class="arrow" fill="#58a6ff">❯</text>
    <text x="55" y="122" class="line-text" textLength="450" lengthAdjust="spacingAndGlyphs">Software Dev @ UAlberta (Part-time)</text>
    <text x="512" y="122" class="cursor blink" fill="#58a6ff">▍</text>
  </g>
  <rect class="bar" style="animation-delay:9.6s" x="30" y="140" width="840" height="3" rx="1.5" fill="#58a6ff"/>

  <!-- line 6 -->
  <g class="rotator" style="animation-delay:12s">
    <text x="30" y="122" class="arrow" fill="#3fb950">❯</text>
    <text x="55" y="122" class="line-text" textLength="410" lengthAdjust="spacingAndGlyphs">Dean's Research Award · 2024–25</text>
    <text x="472" y="122" class="cursor blink" fill="#3fb950">▍</text>
  </g>
  <rect class="bar" style="animation-delay:12s" x="30" y="140" width="840" height="3" rx="1.5" fill="#3fb950"/>

  <!-- line 7 -->
  <g class="rotator" style="animation-delay:14.4s">
    <text x="30" y="122" class="arrow" fill="#f0883e">❯</text>
    <text x="55" y="122" class="line-text" textLength="340" lengthAdjust="spacingAndGlyphs">Ongoing AI/ML Explorations</text>
    <text x="402" y="122" class="cursor blink" fill="#f0883e">▍</text>
  </g>
  <rect class="bar" style="animation-delay:14.4s" x="30" y="140" width="840" height="3" rx="1.5" fill="#f0883e"/>

  <!-- line 8 -->
  <g class="rotator" style="animation-delay:16.8s">
    <text x="30" y="122" class="arrow" fill="#a371f7">❯</text>
    <text x="55" y="122" class="line-text" textLength="340" lengthAdjust="spacingAndGlyphs">Building a Terminal IDE ⚡</text>
    <text x="402" y="122" class="cursor blink" fill="#a371f7">▍</text>
  </g>
  <rect class="bar" style="animation-delay:16.8s" x="30" y="140" width="840" height="3" rx="1.5" fill="#a371f7"/>

  <text x="870" y="188" text-anchor="end" class="foot">auto-refreshing · v2.0</text>
</svg>
