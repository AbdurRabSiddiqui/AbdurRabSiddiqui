<svg width="100%" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <filter id="glowG">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowR">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    svg { background: black; }

    .text {
      font-family: monospace;
      font-size: 34px;
      text-anchor: middle;
      dominant-baseline: middle;
      opacity: 0;
      animation: show 21s infinite;
    }

    .phrase:nth-of-type(1) { animation-delay: 0s;  fill:#00ff66; filter:url(#glowG); }
    .phrase:nth-of-type(2) { animation-delay: 3s;  fill:#ff4040; filter:url(#glowR); }
    .phrase:nth-of-type(3) { animation-delay: 6s;  fill:#00ff66; filter:url(#glowG); }
    .phrase:nth-of-type(4) { animation-delay: 9s;  fill:#ff4040; filter:url(#glowR); }
    .phrase:nth-of-type(5) { animation-delay: 12s; fill:#00ff66; filter:url(#glowG); }
    .phrase:nth-of-type(6) { animation-delay: 15s; fill:#ff4040; filter:url(#glowR); }
    .phrase:nth-of-type(7) { animation-delay: 18s; fill:#00ff66; filter:url(#glowG); }

    @keyframes show {
      0%   { opacity: 0; transform: translateY(8px) scale(0.98); }
      6%   { opacity: 1; transform: translateY(0px) scale(1); }
      14%  { opacity: 1; }
      18%  { opacity: 0; transform: translateY(-6px) scale(1.01); }
      100% { opacity: 0; }
    }

    .scan {
      animation: scan 6s linear infinite;
    }

    @keyframes scan {
      from { transform: translateY(-200px); opacity: 0.05; }
      to   { transform: translateY(200px); opacity: 0.05; }
    }
  </style>

  <rect width="100%" height="100%" fill="black"/>

  <!-- scanline -->
  <rect class="scan" x="0" y="-200" width="900" height="3" fill="white"/>

  <text class="text phrase" x="50%" y="55%" textLength="820">
    ML Intern @ ECE UAlberta (2026)
  </text>

  <text class="text phrase" x="50%" y="55%" textLength="820">
    AWS Certified Cloud Practitioner
  </text>

  <text class="text phrase" x="50%" y="55%" textLength="820">
    1x Hackathon Winner
  </text>

  <text class="text phrase" x="50%" y="55%" textLength="820">
    SQA Intern @ Black Box Labz (2025)
  </text>

  <text class="text phrase" x="50%" y="55%" textLength="820">
    Software Dev @ UAlberta (Part-time)
  </text>

  <text class="text phrase" x="50%" y="55%" textLength="820">
    Dean's Research Award (2024–25)
  </text>

  <text class="text phrase" x="50%" y="55%" textLength="820">
    Ongoing AI/ML Explorations
  </text>

</svg>
