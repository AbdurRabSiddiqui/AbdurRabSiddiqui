<svg width="100%" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <filter id="glowG">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowR">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00ff66" stroke-width="0.3" opacity="0.08"/>
    </pattern>

    <!-- brighter yellow + white dots -->
    <pattern id="dots" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.6" fill="#ffffff" opacity="0.35"/>
      <circle cx="32" cy="22" r="1.8" fill="#ffd400" opacity="0.45"/>
      <circle cx="52" cy="38" r="1.5" fill="#ffffff" opacity="0.30"/>
      <circle cx="20" cy="50" r="1.7" fill="#ffd400" opacity="0.40"/>
    </pattern>
  </defs>

  <style>
    svg { background: black; }

    .bg {
      animation: drift 10s linear infinite;
    }

    .dots {
      animation: float 6s ease-in-out infinite;
    }

    @keyframes drift {
      from { transform: translateY(0px); }
      to   { transform: translateY(-40px); }
    }

    @keyframes float {
      0%   { transform: translateY(0px); opacity: 0.6; }
      50%  { transform: translateY(-6px); opacity: 0.9; }
      100% { transform: translateY(0px); opacity: 0.6; }
    }

    .text {
      font-family: monospace;
      font-size: 32px;
      text-anchor: middle;
      dominant-baseline: middle;
      opacity: 0;
      animation: show 14s infinite;
    }

    .phrase:nth-of-type(1) { animation-delay: 0s;  fill:#00ff66; filter:url(#glowG); }
    .phrase:nth-of-type(2) { animation-delay: 2s;  fill:#ff4040; filter:url(#glowR); }
    .phrase:nth-of-type(3) { animation-delay: 4s;  fill:#00ff66; filter:url(#glowG); }
    .phrase:nth-of-type(4) { animation-delay: 6s;  fill:#ff4040; filter:url(#glowR); }
    .phrase:nth-of-type(5) { animation-delay: 8s;  fill:#00ff66; filter:url(#glowG); }
    .phrase:nth-of-type(6) { animation-delay: 10s; fill:#ff4040; filter:url(#glowR); }
    .phrase:nth-of-type(7) { animation-delay: 12s; fill:#00ff66; filter:url(#glowG); }

    @keyframes show {
      0%   { opacity: 0; transform: translateY(6px) scale(0.98); }
      8%   { opacity: 1; transform: translateY(0px) scale(1); }
      18%  { opacity: 1; }
      25%  { opacity: 0; transform: translateY(-4px) scale(1.01); }
      100% { opacity: 0; }
    }

    .scan {
      animation: scan 4s linear infinite;
    }

    @keyframes scan {
      from { transform: translateY(-200px); opacity: 0.06; }
      to   { transform: translateY(200px); opacity: 0.06; }
    }
  </style>

  <rect width="100%" height="100%" fill="black"/>

  <!-- grid -->
  <rect width="900" height="200" fill="url(#grid)" class="bg"/>

  <!-- brighter dots -->
  <rect width="900" height="200" fill="url(#dots)" class="dots"/>

  <!-- scanline -->
  <rect class="scan" x="0" y="-200" width="900" height="2" fill="white"/>

  <!-- text -->
  <text class="text phrase" x="50%" y="55%" textLength="820">
    ML Intern @ ECE UAlberta (2026)
  </text>

  <text class="text phrase" x="50%" y="55%" textLength="820">
    AWS Certified Cloud Practitioner
  </text>

  <text class="text phrase" x="50%" y="55%" textLength="820">
    1x Hackathon Winner
  </text>

  <text class="text phrase" x="50%" y="55%" textLength="820">
    SQA Intern @ Black Box Labz (2025)
  </text>

  <text class="text phrase" x="50%" y="55%" textLength="820">
    Software Dev @ UAlberta (Part-time)
  </text>

  <text class="text phrase" x="50%" y="55%" textLength="820">
    Dean's Research Award (2024–25)
  </text>

  <text class="text phrase" x="50%" y="55%" textLength="820">
    Ongoing AI/ML Explorations
  </text>

</svg>
